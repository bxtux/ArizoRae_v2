# ============================================================
#  Traefik v3 — Configuration principale
# ============================================================

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: false
  insecure: false

ping:
  entryPoint: web

log:
  level: WARN
  format: json

accessLog:
  format: json
  filters:
    statusCodes:
      - "400-599"

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: duckdns
        domains:
          - main: "${DOMAIN}"
    http3:
      advertisedPort: 443

# ── Let's Encrypt via DNS-01 (DuckDNS) ─────────────────────
# Permet les certificats wildcard sans exposer le port 80
certificatesResolvers:
  duckdns:
    acme:
      email: "${ACME_EMAIL:-admin@example.com}"
      storage: /letsencrypt/acme.json
      caServer: https://acme-v02.api.letsencrypt.org/directory
      dnsChallenge:
        provider: duckdns
        # DuckDNS se propage rapidement, 15s suffisent
        delayBeforeCheck: 15
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

# ── Providers ───────────────────────────────────────────────
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: arizorae_proxy
    watch: true

  file:
    directory: /etc/traefik/dynamic
    watch: true
