# ============================================================
#  nginx — Configuration hardened pour le portal ArizoRAE
# ============================================================

worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Sécurité de base ────────────────────────────────────
    server_tokens off;
    more_clear_headers Server;

    # ── Performance ─────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30;

    # ── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    # ── Format de log minimal ───────────────────────────────
    log_format main '$remote_addr "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Health check (pour Docker healthcheck) ──────────
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Fichiers statiques ──────────────────────────────
        location / {
            try_files $uri $uri/ =404;

            # Méthodes autorisées uniquement
            limit_except GET HEAD OPTIONS {
                deny all;
            }

            # Cache agressif pour les assets (immutables)
            location ~* \.(js|css|png|jpg|ico|woff2?)$ {
                expires 1d;
                add_header Cache-Control "public, immutable";
            }

            # Téléchargement du skill — Content-Disposition
            location /downloads/ {
                add_header Content-Disposition 'attachment; filename="rae-generic.skill"';
                types { application/octet-stream skill; }
                expires off;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # ── Téléchargements générés par le terminal ─────────
        # Servi depuis le volume Docker partagé (downloads)
        # Chaque session a son propre sous-dossier UUID
        location /files/ {
            alias /usr/share/nginx/files/;
            autoindex off;
            # Forcer le téléchargement (pas d'affichage navigateur)
            add_header Content-Disposition 'attachment';
            # Pas de cache — fichiers temporaires
            expires off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            # Méthodes : GET uniquement
            limit_except GET HEAD {
                deny all;
            }
        }

        # ── Bloquer les fichiers cachés ──────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Bloquer les extensions sensibles ───────────────
        location ~* \.(env|git|sh|yml|yaml|toml)$ {
            deny all;
        }
    }
}
